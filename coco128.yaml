# Configuración del dataset COCO128 para Ultralytics YOLOv8
# Ultralytics descarga automáticamente el dataset si no existe localmente.
# Ver: https://docs.ultralytics.com/datasets/detect/coco/

# Rutas (relativas a la carpeta 'datasets/' que Ultralytics gestiona sola)
path: ../datasets/coco128   # carpeta raíz del dataset
train: images/train2017     # imágenes de entrenamiento (subconjunto de 128)
val: images/train2017       # mismo subconjunto se usa para validar (es solo un demo)

# Descarga automática (Ultralytics resuelve esta URL si la carpeta no existe)
download: https://github.com/ultralytics/assets/releases/download/v0.0.0/coco128.zip

# Número de clases
nc: 80

# Nombres de clases (las 80 clases estándar de COCO)
names:
